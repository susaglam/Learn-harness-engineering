name: evals

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: this job only reads code and runs Python.
permissions:
  contents: read

jobs:
  evals:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # The evals themselves run dependency-free (fake models, no network);
      # this step doubles as a smoke test that requirements.txt is installable.
      - name: Install dependencies (requirements smoke test)
        run: pip install -r requirements.txt
      - name: Run all lesson evals (RED with stub, GREEN with reference)
        run: python run_all_evals.py
